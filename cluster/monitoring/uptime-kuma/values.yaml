app-template:
  controllers:
    uptime-kuma:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app: &app uptime-kuma
      containers:
        uptime-kuma:
          env:
            TZ: America/New_York
          image:
            repository: louislam/uptime-kuma
            tag: 2.2.0@sha256:85d68948704fcadc7438f45c9f2666ef2239b5b84073479e1c5bc4d4d8b6d17c
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 50Mi
            limits:
              memory: 150Mi
  service:
    uptime-kuma:
      controller: *app
      labels:
        app: *app
      ports:
        http:
          port: 3001
          protocol: TCP
  route:
    uptime-kuma:
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/icon: uptime-kuma.svg
        gethomepage.dev/name: "Uptime Kuma"
        gethomepage.dev/group: Monitoring
        external-dns.alpha.kubernetes.io/target: "external.aisling.dev"
      hostnames:
        - status.aisling.dev
      parentRefs:
        - name: envoy-aisling-dev-external
          namespace: network
  persistence:
    data:
      existingClaim: pvc-uptime-kuma
      globalMounts:
        - path: /app/data
