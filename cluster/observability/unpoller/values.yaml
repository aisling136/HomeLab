app-template:
  controllers:
    unpoller:
      labels:
        app: &app unpoller
      containers:
        unpoller:
          image:
            repository: ghcr.io/unpoller/unpoller
            tag: v3.3.0@sha256:1c03bc25d83c5dde54e7436a010851d2db4831f8afe4f2ee60699d52dd01c5c4
          env:
            TZ: America/New_York
            UP_UNIFI_DEFAULT_ROLE: home-ops
            UP_UNIFI_DEFAULT_URL: https://192.168.1.1
            UP_PROMETHEUS_HTTP_LISTEN: 0.0.0.0:80
            UP_INFLUXDB_DISABLE: true
          envFrom:
            - secretRef:
                name: unpoller-secret
          probes:
            liveness:
              enabled: true
            readiness:
              enabled: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 128Mi
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile: { type: RuntimeDefault }
  service:
    app:
      controller: unpoller
      labels:
        app: *app
      ports:
        http:
          port: 80
  serviceMonitor:
    app:
      serviceName: unpoller
      endpoints:
        - port: http
          scheme: http
          path: /metrics
          interval: 2m # Unifi API only polls at 2m intervals
          scrapeTimeout: 10s