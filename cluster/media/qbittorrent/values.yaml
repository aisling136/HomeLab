app-template:
  controllers:
    qbittorrent:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app: &app qbittorrent
      containers:
        qbittorrent:
          image:
            repository: ghcr.io/home-operations/qbittorrent
            tag: 5.2.3@sha256:4fcf15b7f265c2c8d7bc2a7e13240a07e0593c326f3cf3b5b9bb69eec5b79299
          env:
            TZ: America/New_York
            QBT_WEBUI_PORT: &port 80
            QBT_TORRENTING_PORT: &bittorrentPort 50413
          probes:
            liveness:
              enabled: true
              spec:
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 5
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/v2/app/version
                  port: *port
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests:
              cpu: 300m
            limits:
              memory: 8Gi
      pod:
        securityContext:
          runAsUser: 568
          runAsGroup: 568
          fsGroup: 568
          fsGroupChangePolicy: OnRootMismatch
          supplementalGroups: [10000]
  service:
    qbittorrent:
      controller: qbittorrent
      type: LoadBalancer
      labels:
        app: *app
      annotations:
        io.cilium/lb-ipam-ips: 192.168.3.242
      ports:
        http:
          port: *port
        bittorrent:
          enabled: true
          port: *bittorrentPort
          protocol: TCP
  route:
    qbittorrent:
      parentRefs:
        - name: envoy-aisling-dev-internal
          namespace: network
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Qbittorrent"
        gethomepage.dev/icon: qbittorrent.svg
        gethomepage.dev/group: Downloads
        gethomepage.dev/widget.type: qbittorrent
        gethomepage.dev/widget.url: http://qbittorrent.media
        gethomepage.dev/widget.enableLeechProgress: "true"
      hostnames:
        - qb.aisling.dev
      rules:
        - backendRefs:
            - identifier: qbittorrent
              port: *port
  persistence:
    config:
      existingClaim: qbittorrent
    media:
      type: nfs
      server: crypt
      path: /mnt/pool0/media
      globalMounts:
        - path: /media
