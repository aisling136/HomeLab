app-template:
  controllers:
    plex:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app: &app plex
      containers:
        plex:
          image:
            repository: ghcr.io/home-operations/plex
            tag: 1.43.1.10611@sha256:a9c3723cb31cc9621df27cf5801184c290293adf1df2bfaea4b8b6fc01dbfd96
          env:
            TZ: America/New_York
            PLEX_ADVERTISE_URL: https://plex.aisling.dev,http://192.168.3.244
            PLEX_NO_AUTH_NETWORKS: 192.168.1.0/24,192.168.3.0/24
          probes:
            liveness:
              enabled: true
              spec:
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 5
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /identity
                  port: &port 32400
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 5
            startup:
              enabled: true
              spec:
                failureThreshold: 30
                periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            claims:
              - name: gpu
            requests:
              cpu: 100m
            limits:
              memory: 12Gi
  defaultPodOptions:
    nodeSelector:
      transcode: "true"
    resourceClaims:
      - name: gpu
        resourceClaimTemplateName: plex
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      supplementalGroups: [44]
      seccompProfile: { type: RuntimeDefault }
  service:
    plex:
      controller: plex
      type: LoadBalancer
      labels:
        app: *app
      annotations:
        io.cilium/lb-ipam-ips: 192.168.3.244
      ports:
        http:
          port: 32400
  route:
    plex:
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Plex"
        gethomepage.dev/icon: plex.svg
        gethomepage.dev/group: Media
        gethomepage.dev/widget.type: plex
        gethomepage.dev/widget.url: https://plex.aisling.dev
        gethomepage.dev/widget.key: '{{ "{{HOMEPAGE_VAR_PLEX_TOKEN}}" }}'
        external-dns.alpha.kubernetes.io/target: external.aisling.dev
      hostnames:
        - plex.aisling.dev
      parentRefs:
        - name: envoy-aisling-dev-external
          namespace: network
  persistence:
    config:
      existingClaim: plex
      globalMounts:
      - path: /config/Library/Application Support/Plex Media Server
    cache:
      existingClaim: plex-cache
      globalMounts:
        - path: /config/Library/Application Support/Plex Media Server/Cache
    logs:
      type: emptyDir
      globalMounts:
        - path: /config/Library/Application Support/Plex Media Server/Logs
    tmp:
      type: emptyDir
    transcode:
      type: emptyDir
    media:
      type: nfs
      server: crypt
      path: /mnt/pool0/media
      globalMounts:
        - path: /media
          readOnly: true
