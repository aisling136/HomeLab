app-template:
  controllers:
    atuin:
      replicas: 1
      strategy: RollingUpdate
      labels:
        app: &app atuin
      annotations:
        reloader.stakater.com/auto: "true"
      containers:
        atuin:
          image:
            repository: ghcr.io/atuinsh/atuin
            tag: 18.13.4@sha256:510269642461d9eb3f5808bf14894e1eabda43756c135cdc0b7c63285f4c3da3
          env:
            ATUIN_HOST: 0.0.0.0
            ATUIN_PORT: &port 80
            ATUIN_OPEN_REGISTRATION: "true"
            ATUIN_METRICS__ENABLE: "true"
            ATUIN_METRICS__HOST: 0.0.0.0
            ATUIN_METRICS__PORT: &metricsPort 8080
            ATUIN_TLS__ENABLE: "false"
            ATUIN_DB_URI: "sqlite:///config/atuin.db"
          args: ["start"]
          probes:
            liveness:
              enabled: true
              spec:
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 5
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: *port
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 5
            startup:
              enabled: true
              spec:
                failureThreshold: 30
                periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 256Mi
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile: { type: RuntimeDefault }
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: *app
  service:
    atuin:
      controller: *app
      type: LoadBalancer
      annotations:
        io.cilium/lb-ipam-ips: 192.168.3.245
      labels:
        app: *app
      ports:
        http:
          primary: true
          port: *port
        metrics:
          port: *metricsPort
  serviceMonitor:
    atuin:
      serviceName: *app
      endpoints:
        - port: metrics
          scheme: http
          path: /metrics
          interval: 1m
          scrapeTimeout: 10s
  route:
    atuin:
      hostnames:
        - "sh.aisling.dev"
      parentRefs:
        - name: envoy-aisling-dev-internal
          namespace: network
  persistence:
    config:
      existingClaim: atuin
